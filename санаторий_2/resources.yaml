  notes:
    note1: "Сразу скажу, всё что вы видите написанным -вот так- это мысли главного героя(да мне было лень писать отдельный блок нарратора с названием Мысли. Идите нахуй.)."
    note2: "Я ТУТ БЛЯТЬ ПОДЫХАЮ НАХУЙ, У МЕНЯ ЖАРА +47 ДНЁМ И +35 НОЧЬЮ ЭТО ПРОСТО ПИЗДА, В ПРОШЛОМ ГОДУ ТАКОГО НЕ БЫЛО."
    note3: "Таня, если ты читаешь этот мод, то прочитай и это пожалуйста: ТЫ ВЫБРАЛА МАКСИМАЛЬНО УЕБАНСКИЙ СПРАЙТ! УБИТЬ ТЕБЯ МАЛО НАХУЙ! Добро и позитив, всё хорошо, всё нормально."
    note4: "ICQ (от англ. I seek you — «я ищу тебя») — существовавшая в 1996–2024 годах бесплатная кроссплатформенная система мгновенного обмена сообщениями, для мобильных устройств и персональных компьютеров. Позволяла пересылать текстовые сообщения, изображения, видео и аудио через Интернет. В русском компьютерном сленге сервис называли «аськой»"
    note5: "Настоящее имя Егора Летова - Игорь.(канонично получается). Летов родился 10 сентября 1964 года в СССР, советский и российский музыкант, певец, поэт. Летов по мимо мызуки занимался политической деятельностью меняя свои политические взгляды, принимал участие в создании скандальной Национал-большевисткой партии (НБП) Которая позже была запрещена на территории России. КГБ не понравились произведения Гражданской Обороны, в результате осенью 1985 года Летова отправили на принудительное лечение в психбольницу. Биографию по приколу написал."
    note6: "Ви чат или же на английском WeChat, является  китайским мессенджером, в котором интегрированы сщциальные сети FaceBook и Tencent QQ, так же внутри этой системы можно проводит денежные транзакции и его используют для подтверждения личности при пересечении границы между Китаем и Макао ил и Гонконгом. (Ну представте. Сбербанк в который запихнули и ГосУслуги, и Дискорд, и Телеграм)."
    note7: "Дропкик - это удар вперед ногами,используют в рестлинге так дже у дропкика есть разновидности такие как: передний дропкик - когда удар наносится пятками и не вращаясь при этом такой удар обычно наносится в нижнию часть противника, Нижний дропкик - этот делается или сразу или после того как оттолкнулся от канатов, такие дропкики наносят в грудь или в бок оппонента.(Ну тот же самый удар двумя ногами Кайла Крейна из Dying Light)."
    note8: "Ну на самом деле в момент разработки Даня мне всё же сказал значение этого ника. Он сказал что имя из игры Needy Streamer Overload, но этой инфы было мало и я полез бороздить просторы интернета, и понял что это - имя главного героя, либо я слишком тупой чтобы понять это."
    
    
  